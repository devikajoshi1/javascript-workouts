<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Switch case statement</p>
    <script>
        pay = "UPI";
        switch (pay) {
            case "wallet":
                document.write("selected1 : " + pay);
                break;
             case "UPI":
                document.write("selected2 : " + pay);
                break;
             case "credit card":
                document.write("selected3 : " + pay);
                break;
            default:
                document.write("error");
        }
    </script>
</body>
</html>
