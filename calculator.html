<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 20px;
    }

    #result {
      width: 200px;
      height: 50px;
      font-size: 20px;
      text-align: center;
      border: none;
      border-radius: 10px;
      margin-bottom: 20px;
      background: #0f172a;
      color: #22c55e;
    }

    button {
      width: 50px;
      height: 50px;
      margin: 5px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #334155;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #475569;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Calculator</h2>

  <input type="text" id="result" readonly>
  <br>

  <button onclick="add()">+</button>
  <button onclick="sub()">-</button>
  <button onclick="mul()">*</button>
  <button onclick="div()">/</button>
</div>

<script>
function add() {
  let a = 10;
  let b = 5;
  document.getElementById("result").value = "10 + 5 = " + (a + b);
}

function sub() {
  let a = 10;
  let b = 5;
  document.getElementById("result").value = "10 - 5 = " + (a - b);
}

function mul() {
  let a = 10;
  let b = 5;
  document.getElementById("result").value = "10 × 5 = " + (a * b);
}

function div() {
  let a = 10;
  let b = 5;
  document.getElementById("result").value = "10 ÷ 5 = " + (a / b);
}
</script>

</body>
</html>
