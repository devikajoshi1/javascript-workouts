<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array methods</title>
</head>

<body>
    <h3>Array</h3>
    <script>
        let box = ["Apple", "Banana", "red", 89]; //creating array
        document.write(box);
    </script>

    <h3>Push method</h3>
    <script>
        let box1 = ["Apple", "Banana", "red", 89];
        box1.push(10); //add element to at last of the array
        document.write(box1);
    </script>

    <h3>unshift method</h3>
    <script>
        let box2 = ["Apple", "Banana", "red", 89];
        box2.unshift(10);  //add element at the begging of the array


        //include method. it will check whether the arry element is present or not - true or false
        document.write(box2.includes("table") + "<br>");
        document.write(box2);



    </script>

    <h3>Array literal using loop</h3>
    <script>
        let box3 = ["Apple", "Banana", "red", 89];
        for (i = 0; i < box.length; i++) {
            document.write(box3[i] + "<br>");
        }
    </script>

    <h3>Length method</h3>
    <script>
        let box4 = ["Apple", "Banana", "red", 89];
        document.write(box4.length);  //to find the length of array
    </script>

    <h3>Type of method</h3>
    <script>
        let box5 = ["Apple", "Banana", "red", 89];
        document.write(typeof box5); //datatype of the array
    </script>


    <h3>Type of loops</h3>

    <h3>For loop</h3>
    <script>
        let number = [10, 20, 30];  //for loop print each value 
        for (let i = 0; i < number.length; i++) {
            document.write(number[i] + "<br>");
        }
    </script>

    <h3>For Each</h3>
    <script>
        let num1 = [10, 20, 30];
        num1.forEach(num => {
            document.write(num + "<br>"); //focus on action not looping
        })
    </script>

    <h3>For of</h3>
    <script>
        let num2 = [40, 20, 30];
        for (let num of num2) {
            document.write(num + "<br>");  //easy readable and 
        }
    </script>


</body>

</html>
