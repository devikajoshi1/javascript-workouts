<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>Do - while loop</p>
    <script>
        var pay = 0;
        var episode = 1;
        console.log("welcome to mxplayer");
        console.log("Money Heist");

        do {
            console.log("Current episode :" + episode);
            let skip = prompt("if you want to skip episode " + episode + " enter y");
            if (skip == "y") {
                console.log("skip episode :" + episode);
                episode += 1;
                continue
            }
            console.log("episode:" + episode + "completed");
            episode += 1;
            if (pay != 1) {
                var pay = prompt(("if you want to play next episode please pay. select option : \n 1.pay \n 2.cancel \n"));
            }
            parseInt(pay);
        }
        while (pay == 1 && episode < 5) {
            if (pay == 0) {
                console.log("Not subscribe plz subscribe for next episode");
            }
            else {
                console.log("episode completed");
            }
        }

    </script>
</body>

</html>
