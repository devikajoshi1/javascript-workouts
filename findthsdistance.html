<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Find the distance</h3>
    <script>
        //to find how the user is going to tavel we need to declare variable to receive the input
        const walk = 3;
        const bike = 60;
        const car = 80;

        //map starting ending point
        var lat1 = 18.943889; //start point.  north to south 
        var lon1 = 72.835991; //start point
        var lat2 = 19.218330; //end point. //east to west 
        var lon2 = 72.978088; //end point

        function distance() {
            //covert degrees to radians (because sin,cos will accept only radians)
            var lat1Rad = lat1 * Math.PI / 180;
            var lon1Rad = lon1 * Math.PI / 180;
            var lat2Rad = lat2 * Math.PI / 180;
            var lon2Rad = lon2 * Math.PI / 180;

            //haversine formula to calculate

            distance = Math.acos(Math.sin(lat1Rad) * Math.sin(lat2Rad) + Math.cos(lat1Rad) * 
                Math.cos(lat2Rad) * Math.cos(lon2Rad - lon1Rad)) * 6371 ;  //earth radius in km 
            
                document.write(distance + "<br>"); //first output
                document.write(distance.toFixed(2) + "KM" + "<br>"); //make it readable 

        }
        distance();
            //to get user input
        var mode = prompt("Select the mode : \n1.walk \n2.bike \n3.car");
        if(mode == "1"){
            time = distance / walk ;  //time and distance formula to find the time taken by the walk

        }
        else if(mode == "2"){
            time = distance / bike;  //time and distance formula to find the time taken by the bike

        }
        else if(mode == "3"){
            time = distance / car;  //time and distance formula to find the time taken by the car

        }

        document.write(time +"<br>"); //covert time into hrs/min

        if(time < 1){ //if the time is between 12 am to 1 am
            document.write("time : " + time.toFixed(2) + "Min" ) 
        }
        else{ 
            document.write("time: " +time.toFixed(2) + "Hrs")
        }
        
    </script>
</body>
</html>
