<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Tyoe of Function</p>
    <script>
        let name = "Javascript";
        document.write("data type of name is :" + (typeof name) + "<br>");
        //parseint
        document.write(parseInt("123")+ "<br>");
        document.write(parseInt("123.99")+ "<br>");
        document.write(parseInt("10px")+ "<br>");
        
        //boolean
        document.write(Boolean(1)+ "<br>");
        document.write(Boolean(0)+ "<br>");
        document.write(Boolean("hello")+ "<br>");
        document.write(Boolean("")+ "<br>");
        document.write(Boolean(null)+ "<br>");
        document.write(Boolean(undefined)+ "<br>");
        
        //float
        document.write(parseFloat("123.45")+ "<br>");
        document.write(parseFloat("10.99abc")+ "<br>");
        document.write(parseFloat("100")+ "<br>");
        document.write(parseFloat("abc")+ "<br>");

        //number
        document.write(Number("123")+ "<br>");
        document.write(Number("123.45")+ "<br>");
        document.write(Number("")+ "<br>");
        document.write(Number("abc")+ "<br>");
        document.write(Number(true)+ "<br>");
        document.write(Number(false)+ "<br>");

        //string
        document.write(String(123)+ "<br>");
        document.write(String(true)+ "<br>");
        document.write(String(null)+ "<br>");
        document.write(String(undefined)+ "<br>");
        document.write(String(123.45)+ "<br>");
    </script>

</body>
</html>
